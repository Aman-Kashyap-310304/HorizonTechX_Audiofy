    <style>
        /* ==========================================================================
         * 1. CSS CUSTOM PROPERTIES & UNIVERSAL RESET
         * ========================================================================== */
        :root {
            --sidebar-w: 260px;
            --nav-h: 70px;
            --player-h: 100px;
            --bg: #070919;
            --surface: #0f1224;
            --surface-hover: #1a1f3c;
            --muted: #9aa3c7;
            --accent: #007aff;
            --accent-hover: #0056b3;
            --danger: #ff3b30;
            --danger-hover: #cc2922;
            --success: #34c759;
            --border: #20243a;
            --text: #e8ecff;
            --glass-bg: rgba(15, 18, 36, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body, #app {
            height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
         * 2. FLUID APP ARCHITECTURE (CSS GRID)
         * ========================================================================== */
        #app {
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            grid-template-rows: var(--nav-h) 1fr var(--player-h);
            transition: grid-template-columns 0.3s ease;
            position: relative;
        }

        /* Header / Top Navigation */
        header {
            grid-column: 1 / -1; grid-row: 1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; gap: 16px; z-index: 120;
        }

        .header-left { display: flex; align-items: center; gap: 16px; min-width: 220px; }
        
        #menu-toggle {
            background: var(--border); border: none; color: var(--text);
            width: 40px; height: 40px; border-radius: 8px;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition);
        }
        #menu-toggle:hover { background: var(--accent); color: white; }

        .header-title {
            font-weight: 800; font-size: 18px; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, var(--muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 8px;
        }

        /* Live API Search Box */
        .search-box { flex: 1; max-width: 600px; position: relative; }
        .search-box input {
            width: 100%; padding: 12px 16px 12px 44px;
            border-radius: 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-size: 14px;
            outline: none; transition: var(--transition);
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2); }
        .search-box svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); fill: var(--muted); pointer-events: none; }
        .search-clear {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: var(--border); border: none; color: var(--text);
            width: 24px; height: 24px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; font-size: 11px;
        }

        .header-actions { display: flex; items: center; gap: 12px; }
        .action-btn {
            padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--surface-hover); color: var(--text); font-weight: 600; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--transition);
        }
        .action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
        .action-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .action-btn:active { transform: translateY(0); }

        /* Sidebar Navigation */
        #sidebar {
            grid-column: 1; grid-row: 2;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow-y: auto;
            transition: var(--transition); z-index: 115;
        }

        .sidebar-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .sidebar-collapse { background: none; border: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; padding: 4px; }
        .sidebar-collapse:hover { color: var(--text); }

        .sidebar-nav { list-style: none; padding: 12px 12px 0 12px; flex: 1; }
        .nav-item { margin-bottom: 4px; }
        .nav-btn {
            width: 100%; padding: 12px 14px; border-radius: 10px; border: none;
            background: transparent; color: var(--muted); font-weight: 500; font-size: 14px;
            text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            transition: var(--transition); gap: 10px;
        }
        .nav-btn .nav-label { display: flex; align-items: center; gap: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .nav-btn svg { flex-shrink: 0; fill: currentColor; }
        .nav-btn:hover { background: var(--surface-hover); color: var(--text); }
        .nav-btn.active { background: rgba(0, 122, 255, 0.15); color: var(--accent); font-weight: 600; }
        .nav-btn .folder-del { display: none; color: var(--danger); padding: 4px; border-radius: 6px; fill: currentColor; cursor: pointer; flex-shrink: 0; width: 24px; height: 24px; transition: var(--transition); }
        .nav-btn:hover .folder-del { display: flex; align-items: center; justify-content: center; }
        .nav-btn .folder-del:hover { background: rgba(255, 59, 48, 0.2); color: white; }

        #sidebar-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 110; opacity: 0; pointer-events: none; transition: var(--transition); }

        /* Main Content Viewport */
        #main-viewport { grid-column: 2; grid-row: 2; background: var(--bg); overflow-y: auto; padding: 32px; display: flex; flex-direction: column; }
        .viewport-section { display: none; flex: 1; }
        .viewport-section.active { display: flex; flex-direction: column; }
        
        .section-header { margin-bottom: 24px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .section-header h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
        .section-meta { color: var(--muted); font-size: 14px; font-weight: 500; }

        /* Media Cards Grid */
        .vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; align-content: start; }
        .track-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
            padding: 14px; display: flex; flex-direction: column; gap: 12px;
            position: relative; group: card; transition: var(--transition); box-shadow: var(--shadow);
        }
        .track-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 15px 35px -5px rgba(0, 122, 255, 0.25); }
        .track-card.playing-active { border-2px solid var(--accent); background: rgba(0, 122, 255, 0.08); }

        .card-thumb { position: relative; width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: var(--surface-hover); }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .track-card:hover .card-thumb img { transform: scale(1.05); }
        
        .card-play-overlay {
            position: absolute; inset: 0; background: rgba(7, 9, 25, 0.6); backdrop-filter: blur(2px);
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transition); cursor: pointer;
        }
        .track-card:hover .card-play-overlay { opacity: 1; }
        .card-play-btn {
            width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none; color: white;
            display: flex; align-items: center; justify-content: center; transform: scale(0.8); transition: var(--transition); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .card-play-overlay:hover .card-play-btn { transform: scale(1.05); background: var(--accent-hover); }

        .card-type-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.1); }
        
        .card-info { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .track-title { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; }
        .track-artist { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .track-actions { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 12px; margin-top: auto; }
        .action-icon {
            background: none; border: none; color: var(--muted); cursor: pointer;
            padding: 6px; border-radius: 8px; transition: var(--transition); display: flex; align-items: center; justify-content: center;
        }
        .action-icon:hover { color: white; background: var(--surface-hover); }
        .action-icon.heart.active { color: var(--danger) !important; }
        .action-icon.block:hover { color: var(--danger); background: rgba(255, 59, 48, 0.15); }

        /* Blocklist Table */
        .blocklist-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); }
        .blocklist-table { width: 100%; border-collapse: collapse; text-align: left; }
        .blocklist-table th { background: var(--surface-hover); padding: 16px 20px; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .blocklist-table td { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
        .blocklist-table tr:last-child td { border-bottom: none; }

        /* Bottom Player Dock */
        #player-dock {
            grid-column: 1 / -1; grid-row: 3;
            background: var(--surface); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; gap: 24px; z-index: 150;
        }

        .dock-left { display: flex; align-items: center; gap: 16px; width: 30%; min-width: 200px; }
        .dock-art { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: var(--surface-hover); flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .dock-info { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .dock-title { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dock-artist { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .dock-center { flex: 1; max-width: 650px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .dock-controls { display: flex; align-items: center; gap: 20px; }
        .ctrl-btn { background: none; border: none; color: var(--muted); cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; padding: 4px; }
        .ctrl-btn:hover { color: white; transform: scale(1.1); }
        .ctrl-btn.active { color: var(--accent); }
        .ctrl-btn.play-pause { width: 46px; height: 46px; border-radius: 50%; background: white; color: var(--bg); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .ctrl-btn.play-pause:hover { background: var(--accent); color: white; transform: scale(1.05); }

        .scrubber-container { width: 100%; display: flex; align-items: center; gap: 14px; font-size: 11px; font-weight: 600; color: var(--muted); }
        .progress-bar { flex: 1; height: 6px; background: var(--surface-hover); border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; position: relative; }
        .progress-bar:hover .progress-fill { background: var(--accent-hover); }

        .dock-right { display: flex; align-items: center; justify-content: flex-end; gap: 16px; width: 30%; min-width: 150px; }
        .volume-container { display: flex; align-items: center; gap: 10px; max-width: 140px; flex: 1; }
        .volume-slider { width: 100%; height: 6px; background: var(--surface-hover); border-radius: 3px; cursor: pointer; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .volume-fill { height: 100%; background: white; width: 75%; transition: width 0.1s linear; }

        /* Modals & Dialogs */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; animation: modalFade 0.2s ease; padding: 20px; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; max-width: 460px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); animation: modalSlide 0.2s ease; }
        .modal-title { font-size: 20px; font-weight: 800; color: white; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .modal-content { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-btn { padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-hover); color: white; font-weight: 600; font-size: 13px; cursor: pointer; transition: var(--transition); }
        .modal-btn.primary { background: var(--accent); border-color: var(--accent); }
        .modal-btn.danger { background: var(--danger); border-color: var(--danger); }
        .modal-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .modal-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: white; margin-top: 12px; font-size: 14px; outline: none; transition: var(--transition); }
        .modal-input:focus { border-color: var(--accent); }

        .folder-selector { max-height: 280px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; margin-top: 12px; background: var(--bg); }
        .folder-option { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; color: white; font-weight: 500; font-size: 14px; transition: var(--transition); }
        .folder-option:last-child { border-bottom: none; }
        .folder-option:hover { background: var(--surface-hover); color: var(--accent); }
        .folder-option svg { fill: currentColor; flex-shrink: 0; }

        /* Video / Visualizer Modal */
        .visualizer-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 1800; opacity: 0; transition: opacity 0.3s ease; }
        .visualizer-modal.active { display: flex; opacity: 1; }
        .visualizer-container { position: relative; width: 90%; max-width: 1200px; height: 80vh; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
        #vis-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        video.docked-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; z-index: 5; }
        .visualizer-close { position: absolute; top: 24px; right: 24px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: var(--transition); }
        .visualizer-close:hover { background: white; color: black; transform: scale(1.1); }
        .vis-track-title { position: absolute; bottom: 24px; left: 24px; z-index: 10; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); }
        .vis-track-title h3 { font-size: 18px; font-weight: 700; color: white; }
        .vis-track-title p { font-size: 13px; color: var(--muted); }

        /* Toast Notifications */
        .toast { position: fixed; bottom: 124px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 16px 24px; border-radius: 14px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; z-index: 3000; animation: toastSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast.success { border-left-color: var(--success); }
        .toast.danger { border-left-color: var(--danger); }

        /* ==========================================================================
         * 3. UNIVERSAL RESPONSIVE BREAKPOINTS
         * ========================================================================== */
        #app.collapsed-desktop { --sidebar-w: 0px; }

        /* Tiny Mobile Phones (< 480px) */
        @media (max-width: 480px) {
            :root { --nav-h: 64px; --player-h: 140px; }
            header { padding: 0 16px; }
            .header-title span { display: none; }
            #main-viewport { padding: 16px; }
            .vault-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            #player-dock { flex-direction: column; padding: 12px 16px; gap: 12px; height: var(--player-h); }
            .dock-left, .dock-center, .dock-right { width: 100%; justify-content: center; }
            .dock-right { display: none; }
            .dock-art { width: 44px; height: 44px; }
        }

        /* Mobile & Tablets (<= 992px) */
        @media (max-width: 992px) {
            :root { --sidebar-w: 0px; }
            #menu-toggle { display: flex; }
            .header-actions .action-btn span { display: none; }
            #sidebar-collapse-btn { display: none; }
            #sidebar { position: fixed; top: var(--nav-h); bottom: var(--player-h); left: -300px; width: 280px; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
            #sidebar.mobile-open { left: 0; }
            #sidebar-backdrop.mobile-open { opacity: 1; pointer-events: auto; }
        }

        /* Large Smart Boards / 4K Displays (> 1600px) */
        @media (min-width: 1600px) {
            :root { --sidebar-w: 320px; }
            .vault-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 28px; }
            .section-header h2 { font-size: 36px; }
        }

        @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalSlide { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes toastSlide { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="header-left">
            <button id="menu-toggle" title="Open Navigation">
                <img src="icon.svg" alt="Audiofy Logo">
            </button>

<script>
    // Dynamic Runtime SEO Script & Domain Anti-Hacking Script Protection
    (function() {
        const allowedDomains = [window.location.hostname, 'localhost', '127.0.0.1', 'fonts.googleapis.com', 'fonts.gstatic.com', 'aman-kashyap-310304.github.io'];
        const observer = new MutationObserver(mutations => {
            mutations.forEach(mutation => {
                mutation.addedNodes.forEach(node => {
                    if (node.tagName === 'SCRIPT') {
                        if (node.src) {
                            try {
                                const url = new URL(node.src);
                                if (!allowedDomains.includes(url.hostname)) {
                                    node.remove();
                                    console.error('Blocked script from unauthorized domain:', url.hostname);
                                }
                            } catch (e) {
                                node.remove();
                            }
                        }
                    }
                });
            });
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });

        // Meta Injection Helper
        window.updateSEO = function(title, artist = '') {
            const pageTitle = artist ? `${title} - ${artist} | Audiofy` : `${title} | Audiofy`;
            const description = artist ? `Listen to ${title} by ${artist} on Audiofy. Fast, free music preview and streaming platform.` : `${title}. Discover, search, and stream your favorite music on Audiofy.`;
            
            document.title = pageTitle;
            
            let metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', description);
            
            let metaOgTitle = document.querySelector('meta[property="og:title"]');
            if (metaOgTitle) metaOgTitle.setAttribute('content', pageTitle);

            let metaOgDesc = document.querySelector('meta[property="og:description"]');
            if (metaOgDesc) metaOgDesc.setAttribute('content', description);

            let metaTwTitle = document.querySelector('meta[name="twitter:title"]');
            if (metaTwTitle) metaTwTitle.setAttribute('content', pageTitle);

            let metaTwDesc = document.querySelector('meta[name="twitter:description"]');
            if (metaTwDesc) metaTwDesc.setAttribute('content', description);
        };
    })();

    /* ==========================================================================
     * ENGINE 1: BULLETPROOF INDEXEDDB V2 ENGINE (MXDatabase)
     * ========================================================================== */
    class MXDatabase {
        constructor() {
            this.dbName = 'MX_Spotify_Vault';
            this.version = 2;
        }

        async init() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(this.dbName, this.version);
                req.onerror = () => reject(req.error);
                req.onsuccess = () => { this.db = req.result; resolve(); };
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('local_vault')) db.createObjectStore('local_vault', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('custom_folders')) db.createObjectStore('custom_folders', { keyPath: 'id', autoIncrement: true });
                    if (!db.objectStoreNames.contains('folder_mappings')) {
                        const sm = db.createObjectStore('folder_mappings', { keyPath: 'mapId', autoIncrement: true });
                        sm.createIndex('folderId', 'folderId', { unique: false });
                    }
                };
            });
        }

        execute(store, mode, op) {
            return new Promise((resolve, reject) => {
                const tx = this.db.transaction(store, mode);
                const st = tx.objectStore(store);
                let request;
                try {
                    request = op(st);
                    if (request) {
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject(request.error);
                    } else {
                        tx.oncomplete = () => resolve();
                        tx.onerror = () => reject(tx.error);
                    }
                } catch (err) { reject(err); }
            });
        }

        put(store, obj) { return this.execute(store, 'readwrite', s => s.put(obj)); }
        get(store, key) { return this.execute(store, 'readonly', s => s.get(key)); }
        getAll(store) { return this.execute(store, 'readonly', s => s.getAll()); }
        delete(store, key) { return this.execute(store, 'readwrite', s => s.delete(key)); }
        getByIndex(store, idx, val) { return this.execute(store, 'readonly', s => s.index(idx).getAll(val)); }

        async deleteFolderCascade(folderId) {
            await this.delete('custom_folders', folderId);
            const mappings = await this.getByIndex('folder_mappings', 'folderId', folderId);
            for (const m of mappings) await this.delete('folder_mappings', m.mapId);
        }
    }

    /* ==========================================================================
     * ENGINE 2: PROMISE-BASED MODAL ORCHESTRATOR (PamphletCard)
     * ========================================================================== */
    class PamphletCard {
        static build({ title, contentHTML, buttonsHTML }) {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal-box" onclick="event.stopPropagation()">
                        <div class="modal-title">${title}</div>
                        <div class="modal-content">${contentHTML}</div>
                        <div class="modal-buttons">${buttonsHTML}</div>
                    </div>
                `;
                document.body.appendChild(overlay);

                const kill = (val) => { overlay.remove(); resolve(val); };
                overlay.onclick = () => kill(null);
                overlay.querySelectorAll('[data-val]').forEach(b => b.onclick = () => kill(b.getAttribute('data-val') === 'null' ? null : b.getAttribute('data-val')));
            });
        }

        static alert(title, msg) {
            return this.build({
                title: `<svg width="24" height="24" viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span>${title}</span>`,
                contentHTML: msg,
                buttonsHTML: `<button class="modal-btn primary" data-val="ok">Understood</button>`
            });
        }

        static confirm(title, msg) {
            return this.build({
                title: `<svg width="24" height="24" viewBox="0 0 24 24" fill="var(--danger)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><span>${title}</span>`,
                contentHTML: msg,
                buttonsHTML: `
                    <button class="modal-btn" data-val="null">Cancel</button>
                    <button class="modal-btn danger" data-val="yes">Confirm Action</button>
                `
            });
        }

        static prompt(title, msg, placeholder = '') {
            return new Promise(resolve => {
                const id = 'input_' + Math.random().toString(36).slice(2, 8);
                this.build({
                    title: `<span>${title}</span>`,
                    contentHTML: `${msg}<input id="${id}" class="modal-input" placeholder="${placeholder}" autocomplete="off"/>`,
                    buttonsHTML: `
                        <button class="modal-btn" data-val="null">Cancel</button>
                        <button id="prompt-save-btn" class="modal-btn primary" data-val="save">Save</button>
                    `
                }).then(res => { if (!res) resolve(null); });

                setTimeout(() => {
                    const inp = document.getElementById(id);
                    if (inp) { inp.focus(); inp.onkeydown = e => { if (e.key === 'Enter') document.getElementById('prompt-save-btn').click(); }; }
                }, 50);

                document.getElementById('prompt-save-btn').onclick = () => {
                    const val = document.getElementById(id)?.value?.trim();
                    document.querySelector('.modal-overlay')?.remove();
                    resolve(val || null);
                };
            });
        }

        static selectFolder(folders) {
            return new Promise(resolve => {
                const options = `
                    <div class="folder-option" data-id="new">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        <span style="color:var(--accent);">Create New Folder</span>
                    </div>
                    ${folders.map(f => `
                        <div class="folder-option" data-id="${f.id}">
                            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                            <span>${f.name}</span>
                        </div>
                    `).join('')}
                `;
                this.build({
                    title: `<span>Save to Customized Folder</span>`,
                    contentHTML: `<div class="folder-selector">${options}</div>`,
                    buttonsHTML: `<button class="modal-btn" data-val="null">Close</button>`
                }).then(() => resolve(null));

                document.querySelectorAll('.folder-option').forEach(el => el.onclick = async () => {
                    const id = el.getAttribute('data-id');
                    document.querySelector('.modal-overlay')?.remove();
                    if (id === 'new') {
                        const name = await PamphletCard.prompt('Create Folder', 'Enter unique folder name:');
                        resolve(name ? { isNew: true, name } : null);
                    } else {
                        resolve({ isNew: false, id: parseInt(id) });
                    }
                });
            });
        }

        static toast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'danger' : 'success'}`;
            toast.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="${isError ? 'var(--danger)' : 'var(--success)'}"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                <span style="font-size:13px; font-weight:600; color:white;">${msg}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = 0; setTimeout(() => toast.remove(), 300); }, 2500);
        }
    }

    /* ==========================================================================
     * ENGINE 3: MASTER SINK ORCHESTRATOR & VISUALIZER (Web Audio API)
     * ========================================================================== */
    class HTAlbumManager {
        constructor() {
            this.db = new MXDatabase();
            this.sink = document.getElementById('master-media-sink');
            this.audioCtx = null;
            this.analyser = null;
            this.canvas = document.getElementById('vis-canvas');
            this.canvasCtx = this.canvas.getContext('2d');
            this.animId = null;

            this.folders = [];
            this.vault = [];
            this.searchResults = [];

            this.playlist = [];
            this.currentIndex = 0;
            this.currentTrack = null;
            this.activeView = 'my-vault';
            this.activeFolderId = null;

            this.isShuffle = false;
            this.isRepeat = false;
        }

        async boot() {
            await this.db.init();
            await this.refreshState();
            this.bindEvents();
            this.renderSidebar();
            this.switchView('my-vault');
        }

        async refreshState() {
            this.folders = await this.db.getAll('custom_folders');
            this.vault = await this.db.getAll('local_vault');
        }

        getHitKey(track) { return ((track.title || '') + '_' + (track.artist || '')).toLowerCase().replace(/\s+/g, ''); }

        /* --- RESPONSIVE LAYOUT TRIGGERS --- */
        bindEvents() {
            const app = document.getElementById('app');
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');

            const toggleMobileNav = () => { sidebar.classList.toggle('mobile-open'); backdrop.classList.toggle('mobile-open'); };
            document.getElementById('menu-toggle').onclick = toggleMobileNav;
            document.getElementById('sidebar-close-mobile').onclick = toggleMobileNav;
            backdrop.onclick = toggleMobileNav;

            document.getElementById('sidebar-collapse-btn').onclick = () => {
                if (window.innerWidth > 992) app.classList.toggle('collapsed-desktop');
                else toggleMobileNav();
            };

            // Search Triggers
            let timer;
            const searchInp = document.getElementById('search-input');
            const clearBtn = document.getElementById('search-clear');
            searchInp.oninput = () => {
                clearTimeout(timer);
                clearBtn.style.display = searchInp.value ? 'block' : 'none';
                const q = searchInp.value.trim();
                if (q.length < 3) { if (q.length === 0) this.switchView('my-vault'); return; }
                timer = setTimeout(() => this.execiTunesSearch(q), 400);
            };
            clearBtn.onclick = () => { searchInp.value = ''; clearBtn.style.display = 'none'; this.switchView('my-vault'); };

            // Upload Triggers - Advanced 2-Stage Upload Modal
            document.getElementById('upload-btn').onclick = () => this.triggerTwoStageUpload();

            // Sidebar Delegated Navigation
            sidebar.onclick = e => {
                const btn = e.target.closest('.nav-btn');
                if (!btn) return;
                if (e.target.closest('.folder-del')) return;
                
                sidebar.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (window.innerWidth <= 992) toggleMobileNav();

                if (btn.dataset.target) this.switchView(btn.dataset.target);
                else if (btn.dataset.folderId) this.switchView('folder', parseInt(btn.dataset.folderId), btn.querySelector('.nav-label span').textContent);
            };

            document.getElementById('create-folder-btn').onclick = async () => {
                const name = await PamphletCard.prompt('New Folder', 'Enter folder name:');
                if (name) { await this.db.put('custom_folders', { name, created: Date.now() }); await this.refreshState(); this.renderSidebar(); PamphletCard.toast('Folder Created'); }
            };

            // Master Sink Controls Wiring
            document.getElementById('dock-play').onclick = () => { if (!this.currentTrack) return; this.sink.paused ? this.sink.play() : this.sink.pause(); };
            document.getElementById('dock-next').onclick = () => this.nextTrack();
            document.getElementById('dock-prev').onclick = () => this.prevTrack();
            document.getElementById('dock-shuffle').onclick = e => { this.isShuffle = !this.isShuffle; e.currentTarget.classList.toggle('active'); };
            document.getElementById('dock-repeat').onclick = e => { this.isRepeat = !this.isRepeat; e.currentTarget.classList.toggle('active'); };
            document.getElementById('dock-visualizer-btn').onclick = () => this.openVisualizer();
            document.getElementById('vis-close-btn').onclick = () => this.closeVisualizer();

            // Scrubber & Volume
            const scrub = document.getElementById('dock-scrubber');
            scrub.onclick = e => { const r = scrub.getBoundingClientRect(); if (this.sink.duration) this.sink.currentTime = ((e.clientX - r.left) / r.width) * this.sink.duration; };
            const vol = document.getElementById('dock-volume');
            vol.onclick = e => { const r = vol.getBoundingClientRect(); const v = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)); this.sink.volume = v; document.getElementById('dock-vol-fill').style.width = (v * 100) + '%'; };

            // Sink State Listeners
            this.sink.ontimeupdate = () => {
                const cur = this.sink.currentTime || 0; const dur = this.sink.duration || 0;
                document.getElementById('dock-progress').style.width = dur ? ((cur / dur) * 100) + '%' : '0%';
                document.getElementById('dock-curr').textContent = this.fmt(cur);
                document.getElementById('dock-dur').textContent = this.fmt(dur);
            };
            this.sink.onplay = () => { document.getElementById('dock-play').innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`; this.highlightPlayingCard(); };
            this.sink.onpause = () => { document.getElementById('dock-play').innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`; };
            this.sink.onended = () => { if (this.isRepeat) this.sink.play(); else this.nextTrack(); };
        }

        /* --- 2-Stage Upload Pipeline with Sequential and Drag & Drop Thumbnails --- */
        async triggerTwoStageUpload() {
            // Stage 1: Select Media Files
            const mediaFiles = await new Promise(resolve => {
                const fileInp = document.createElement('input');
                fileInp.type = 'file'; fileInp.multiple = true; fileInp.accept = 'audio/*,video/*';
                PamphletCard.build({
                    title: `<svg width="24" height="24" viewBox="0 0 24 24" fill="var(--accent)"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg><span>Stage 1: Upload Media Files</span>`,
                    contentHTML: `<div style="padding:16px 0; text-align:center;"><p style="margin-bottom:20px; color:var(--text);">Select multiple audio or video songs from your device to import into your local offline vault.</p><button id="stg1-pick" class="modal-btn primary" style="width:100%; padding:14px; font-size:15px;">Choose Video / Audio Files</button></div>`,
                    buttonsHTML: `<button class="modal-btn" data-val="null">Cancel Import</button>`
                }).then(res => { if (!res) resolve(null); });

                setTimeout(() => {
                    const pickBtn = document.getElementById('stg1-pick');
                    if (pickBtn) pickBtn.onclick = () => fileInp.click();
                }, 50);

                fileInp.onchange = e => {
                    if (e.target.files.length) {
                        document.querySelector('.modal-overlay')?.remove();
                        resolve(Array.from(e.target.files));
                    }
                };
            });

            if (!mediaFiles || !mediaFiles.length) return;

            // Stage 2: Configure Staging Items
            const stagedItems = mediaFiles.map((file, idx) => ({
                id: 'local_' + Date.now() + '_' + idx + '_' + Math.random().toString(36).slice(2, 6),
                file: file,
                title: file.name.replace(/\.[^/.]+$/, ''),
                artist: '',
                artwork: 'icon.svg',
                isVideo: file.type.startsWith('video/'),
                isLocal: true,
                isFav: false
            }));

            await new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal-box" style="max-width: 680px; width: 100%; display: flex; flex-direction: column; max-height: 85vh;" onclick="event.stopPropagation()">
                        <div class="modal-title" style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="display:flex; align-items:center; gap:8px;">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--accent)"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                                <span>Stage 2: Configure & Design Artwork</span>
                            </span>
                            <span style="font-size:12px; color:var(--muted); font-weight:500;">${stagedItems.length} Tracks</span>
                        </div>
                        <div class="modal-content" style="flex: 1; overflow-y: auto; padding: 10px 0; margin-bottom: 16px;">
                            <div style="background: var(--surface-hover); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center; gap:16px;">
                                <div style="flex:1;">
                                    <h4 style="color:white; font-size:14px; margin-bottom:4px;">Bulk Upload Thumbnails</h4>
                                    <p style="font-size:12px; color:var(--muted);">Select multiple images. They will be sequentially assigned. You can drag and drop images to swap them.</p>
                                </div>
                                <button id="bulk-art-btn" class="modal-btn" style="white-space:nowrap;">Upload Multiple</button>
                                <input id="bulk-art-input" type="file" accept="image/*" multiple style="display:none;"/>
                            </div>
                            <div id="staged-list" style="display:flex; flex-direction:column; gap:16px;"></div>
                        </div>
                        <div class="modal-buttons" style="border-top: 1px solid var(--border); padding-top: 16px;">
                            <button id="staging-cancel" class="modal-btn">Cancel</button>
                            <button id="staging-upload" class="modal-btn primary">Upload to Audiofy</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                const listContainer = overlay.querySelector('#staged-list');
                const bulkArtInput = overlay.querySelector('#bulk-art-input');
                const bulkArtBtn = overlay.querySelector('#bulk-art-btn');
                const cancelBtn = overlay.querySelector('#staging-cancel');
                const uploadBtn = overlay.querySelector('#staging-upload');

                let dragSourceIdx = null;

                const renderStagedList = () => {
                    listContainer.innerHTML = stagedItems.map((item, idx) => {
                        const artSrc = item.artwork;
                        const contrastStyle = artSrc === 'icon.svg' ? 'padding: 10px; background: #070919; object-fit: contain;' : 'padding: 0; object-fit: cover;';
                        return `
                            <div class="stage-row" data-idx="${idx}" ondragover="event.preventDefault()" style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 16px; transition: border-color 0.2s;">
                                <div class="stage-thumb-container" style="position: relative; width: 68px; height: 68px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                                    <img src="${artSrc}" class="stage-img" draggable="true" data-idx="${idx}" style="width: 100%; height: 100%; cursor: grab; ${contrastStyle}" />
                                </div>
                                <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                    <div>
                                        <label style="display:block; font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:600; text-transform:uppercase;">Title</label>
                                        <input type="text" class="modal-input stage-title" data-idx="${idx}" value="${item.title}" style="margin-top:0; padding:10px; width:100%;" />
                                    </div>
                                    <div>
                                        <label style="display:block; font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:600; text-transform:uppercase;">Artist Details</label>
                                        <input type="text" class="modal-input stage-artist" data-idx="${idx}" value="${item.artist}" placeholder="Add Artist Details" style="margin-top:0; padding:10px; width:100%;" />
                                    </div>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:8px;">
                                    <button class="modal-btn single-art-btn" data-idx="${idx}" style="padding: 8px 12px; font-size: 11px;">Upload Art</button>
                                    <input type="file" class="single-art-input" data-idx="${idx}" accept="image/*" style="display:none;" />
                                </div>
                            </div>
                        `;
                    }).join('');

                    // Wire up inputs
                    listContainer.querySelectorAll('.stage-title').forEach(inp => {
                        inp.oninput = e => {
                            const idx = parseInt(inp.dataset.idx);
                            stagedItems[idx].title = inp.value;
                        };
                    });
                    listContainer.querySelectorAll('.stage-artist').forEach(inp => {
                        inp.oninput = e => {
                            const idx = parseInt(inp.dataset.idx);
                            stagedItems[idx].artist = inp.value;
                        };
                    });

                    // Wire up drag events
                    listContainer.querySelectorAll('.stage-img').forEach(img => {
                        img.addEventListener('dragstart', e => {
                            dragSourceIdx = parseInt(img.dataset.idx);
                            e.dataTransfer.effectAllowed = 'move';
                        });
                    });

                    listContainer.querySelectorAll('.stage-row').forEach(row => {
                        row.addEventListener('dragover', e => {
                            e.preventDefault();
                            row.style.borderColor = 'var(--accent)';
                        });
                        row.addEventListener('dragleave', () => {
                            row.style.borderColor = 'var(--border)';
                        });
                        row.addEventListener('drop', e => {
                            e.preventDefault();
                            row.style.borderColor = 'var(--border)';
                            const targetIdx = parseInt(row.dataset.idx);
                            if (dragSourceIdx !== null && dragSourceIdx !== targetIdx) {
                                const tempArt = stagedItems[dragSourceIdx].artwork;
                                stagedItems[dragSourceIdx].artwork = stagedItems[targetIdx].artwork;
                                stagedItems[targetIdx].artwork = tempArt;
                                renderStagedList();
                            }
                            dragSourceIdx = null;
                        });
                    });

                    // Wire up individual file input triggers
                    listContainer.querySelectorAll('.single-art-btn').forEach(btn => {
                        const idx = parseInt(btn.dataset.idx);
                        const fileInp = listContainer.querySelector(`.single-art-input[data-idx="${idx}"]`);
                        btn.onclick = () => fileInp.click();
                        fileInp.onchange = e => {
                            const file = e.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = evt => {
                                    stagedItems[idx].artwork = evt.target.result;
                                    renderStagedList();
                                };
                                reader.readAsDataURL(file);
                            }
                        };
                    });
                };

                // Bulk artwork trigger
                bulkArtBtn.onclick = () => bulkArtInput.click();
                bulkArtInput.onchange = e => {
                    const files = Array.from(e.target.files);
                    let processedCount = 0;
                    files.forEach((file, fIdx) => {
                        if (fIdx < stagedItems.length) {
                            const reader = new FileReader();
                            reader.onload = evt => {
                                stagedItems[fIdx].artwork = evt.target.result;
                                processedCount++;
                                if (processedCount === Math.min(files.length, stagedItems.length)) {
                                    renderStagedList();
                                }
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                };

                cancelBtn.onclick = () => {
                    overlay.remove();
                    resolve(false);
                };

                uploadBtn.onclick = async () => {
                    overlay.remove();
                    for (const item of stagedItems) {
                        const trackObj = {
                            id: item.id,
                            title: item.title || 'Untitled Track',
                            artist: item.artist || 'Offline Vault Media',
                            album: 'My Device Import',
                            artwork: item.artwork,
                            isVideo: item.isVideo,
                            isLocal: true,
                            isFav: false,
                            blob: item.file
                        };
                        await this.db.put('local_vault', trackObj);
                    }
                    resolve(true);
                };

                renderStagedList();
            }).then(uploaded => {
                if (uploaded) {
                    this.refreshState().then(() => {
                        this.switchView('my-vault');
                        PamphletCard.toast(`Successfully imported ${mediaFiles.length} media file(s)`);
                    });
                }
            });
        }

        /* --- Queries only the FREE iTunes Search API for 30-second previews --- */
        async execiTunesSearch(term) {
            document.getElementById('render-search-title').innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="var(--accent)"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>Results for: "${term}"`;
            this.switchView('search-results');
            const grid = document.getElementById('grid-search-results');
            grid.innerHTML = `<div style="grid-column:1/-1; padding:60px; text-align:center; color:var(--muted);">Searching studio previews...</div>`;
            
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&media=music&limit=30`);
                const data = await res.json();
                this.searchResults = (data.results || []).filter(i => i.previewUrl).map(i => ({
                    id: 'api_' + i.trackId, apiId: i.trackId, title: i.trackName, artist: i.artistName, album: i.collectionName,
                    previewUrl: i.previewUrl, artwork: i.artworkUrl100?.replace('100x100bb', '300x300bb') || 'icon.svg',
                    duration: 30, isVideo: false, isLocal: false, isFav: false
                }));
                this.renderUniversalGrid(grid, this.searchResults);
            } catch (err) {
                grid.innerHTML = `<div style="grid-column:1/-1; padding:60px; text-align:center; color:var(--danger);">Search failed. Please check internet connection.</div>`;
            }
        }

        async switchView(target, folderId = null, folderName = '') {
            document.querySelectorAll('.viewport-section').forEach(s => s.classList.remove('active'));
            this.activeView = target; this.activeFolderId = folderId;

            if (target === 'my-vault') {
                document.getElementById('view-my-vault').classList.add('active');
                document.getElementById('vault-count').textContent = `${this.vault.length} Tracks`;
                this.renderUniversalGrid(document.getElementById('grid-my-vault'), this.vault);
            } else if (target === 'loved-ones') {
                document.getElementById('view-loved-ones').classList.add('active');
                const favs = this.vault.filter(t => t.isFav);
                document.getElementById('loved-count').textContent = `${favs.length} Tracks`;
                this.renderUniversalGrid(document.getElementById('grid-loved-ones'), favs);
            } else if (target === 'folder') {
                document.getElementById('view-folder').classList.add('active');
                document.getElementById('render-folder-title').innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="var(--accent)"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>${folderName}`;
                const maps = await this.db.getByIndex('folder_mappings', 'folderId', folderId);
                const mappedIds = maps.map(m => m.trackId);
                const items = this.vault.filter(t => mappedIds.includes(t.id));
                document.getElementById('folder-count').textContent = `${items.length} Mapped Tracks`;
                this.renderUniversalGrid(document.getElementById('grid-folder'), items, true);
            } else if (target === 'search-results') {
                document.getElementById('view-search-results').classList.add('active');
                this.renderUniversalGrid(document.getElementById('grid-search-results'), this.searchResults);
            }
        }

        renderSidebar() {
            const list = document.getElementById('folders-render-list');
            list.innerHTML = this.folders.map(f => `
                <li class="nav-item">
                    <button class="nav-btn ${this.activeFolderId === f.id ? 'active' : ''}" data-folder-id="${f.id}">
                        <span class="nav-label"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg><span>${f.name}</span></span>
                        <svg class="folder-del" data-del="${f.id}" width="16" height="16" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                </li>
            `).join('');

            list.querySelectorAll('.folder-del').forEach(d => d.onclick = async e => {
                e.stopPropagation(); const fid = parseInt(d.dataset.del);
                if (await PamphletCard.confirm('Delete Folder', 'Permanently delete folder and all mappings?')) { await this.db.deleteFolderCascade(fid); await this.refreshState(); this.renderSidebar(); if (this.activeFolderId === fid) this.switchView('my-vault'); PamphletCard.toast('Folder Removed'); }
            });
        }

        /* --- UNIFIED TRI-STATE MEDIA GRID GENERATOR --- */
        renderUniversalGrid(container, tracks, isFolderMap = false) {
            container.innerHTML = '';
            if (!tracks.length) { container.innerHTML = `<div style="grid-column:1/-1; padding:60px; text-align:center; color:var(--muted);">No media matching this context.</div>`; return; }

            tracks.forEach((t, idx) => {
                const card = document.createElement('div');
                card.className = `track-card ${this.currentTrack?.id === t.id ? 'playing-active' : ''}`;
                card.dataset.id = t.id;
                
                const artSrc = t.artwork || 'icon.svg';
                const paddingStyle = artSrc.includes('icon.svg') ? 'padding: 14px; background: var(--surface-hover);' : '';
                
                card.innerHTML = `
                    <div class="card-thumb" style="${paddingStyle}">
                        <img src="${artSrc}" alt="Art" style="${artSrc.includes('icon.svg') ? 'object-fit: contain;' : ''}" />
                        <div class="card-type-badge">${t.isVideo ? 'Video' : (t.isLocal ? 'Vault' : 'Studio')}</div>
                        <div class="card-play-overlay"><button class="card-play-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></button></div>
                    </div>
                    <div class="card-info">
                        <span class="track-title" title="${t.title}">${t.title}</span>
                        <span class="track-artist">${t.artist || 'Unknown Artist'}</span>
                    </div>
                    <div class="track-actions">
                        <button class="action-icon folder" title="Add to Folder"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M14 10H2v2h12v-2zm0-4H2v2h12V6zm4 8v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM2 16h8v-2H2v2z"/></svg></button>
                        <button class="action-icon heart ${t.isFav ? 'active' : ''}" title="Loved One"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
                        ${isFolderMap ? `<button class="action-icon block" title="Remove from Folder"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 11H7v-2h10v2z"/></svg></button>` : ''}
                        ${t.isLocal ? `<button class="action-icon delete" title="Delete Track"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>` : ''}
                    </div>
                `;

                // Card Play Control
                card.querySelector('.card-play-overlay').onclick = () => { this.playlist = tracks; this.currentIndex = idx; this.execPlay(t); };
                
                // Add to Folder
                card.querySelector('.folder').onclick = async e => {
                    e.stopPropagation(); const res = await PamphletCard.selectFolder(this.folders);
                    if (!res) return;
                    let targetTrack = t;
                    if (!t.isLocal) { targetTrack = { ...t, id: 'saved_' + t.apiId, isLocal: true }; await this.db.put('local_vault', targetTrack); }
                    const folderId = res.isNew ? (await this.db.put('custom_folders', { name: res.name, created: Date.now() })) : res.id;
                    await this.db.put('folder_mappings', { folderId, trackId: targetTrack.id }); await this.refreshState(); this.renderSidebar(); PamphletCard.toast('Added to Folder');
                };

                // Loved Heart Action
                const hBtn = card.querySelector('.heart');
                hBtn.onclick = async e => {
                    e.stopPropagation(); let targetTrack = t;
                    if (!t.isLocal) { targetTrack = { ...t, id: 'saved_' + t.apiId, isLocal: true }; }
                    targetTrack.isFav = !targetTrack.isFav; await this.db.put('local_vault', targetTrack); await this.refreshState(); hBtn.classList.toggle('active'); PamphletCard.toast(targetTrack.isFav ? 'Added to Loved Ones' : 'Removed from Favorites');
                };

                // Remove from custom folder mapping
                if (isFolderMap) {
                    card.querySelector('.block').onclick = async e => {
                        e.stopPropagation();
                        const mapObj = (await this.db.getByIndex('folder_mappings', 'folderId', this.activeFolderId)).find(m => m.trackId === t.id);
                        if (mapObj) await this.db.delete('folder_mappings', mapObj.mapId); card.remove(); PamphletCard.toast('Removed from folder');
                    };
                }

                // Delete local track
                if (t.isLocal) {
                    card.querySelector('.delete').onclick = async e => {
                        e.stopPropagation();
                        if (await PamphletCard.confirm('Delete Track', `Are you sure you want to permanently delete "${t.title}" from your offline vault?`)) {
                            await this.db.delete('local_vault', t.id);
                            const allMappings = await this.db.getAll('folder_mappings');
                            for (const m of allMappings) {
                                if (m.trackId === t.id) {
                                    await this.db.delete('folder_mappings', m.mapId);
                                }
                            }
                            await this.refreshState();
                            this.switchView(this.activeView, this.activeFolderId);
                            PamphletCard.toast('Track deleted successfully');
                        }
                    };
                }

                container.appendChild(card);
            });
        }

        /* --- SINK PLAYBACK ENGINE --- */
        async execPlay(t) {
            this.currentTrack = t;
            document.getElementById('dock-title').textContent = t.title;
            document.getElementById('dock-artist').textContent = t.artist || 'Unknown Artist';
            document.getElementById('dock-art').src = t.artwork || 'icon.svg';
            
            // Trigger dynamic runtime SEO update
            if (typeof window.updateSEO === 'function') {
                window.updateSEO(t.title, t.artist);
            }
            
            if (t.isLocal && t.blob) this.sink.src = URL.createObjectURL(t.blob);
            else if (t.previewUrl) this.sink.src = t.previewUrl;
            else return PamphletCard.toast('Media corrupted', true);

            if (t.isVideo) this.openVisualizer();
            await this.sink.play().catch(() => PamphletCard.toast('Autoplay blocked', true));
            this.initWebAudioVisualizer();
        }

        nextTrack() { if (!this.playlist.length) return; let nextIdx = this.isShuffle ? Math.floor(Math.random() * this.playlist.length) : (this.currentIndex + 1) % this.playlist.length; this.currentIndex = nextIdx; this.execPlay(this.playlist[nextIdx]); }
        prevTrack() { if (!this.playlist.length) return; let prevIdx = (this.currentIndex - 1 + this.playlist.length) % this.playlist.length; this.currentIndex = prevIdx; this.execPlay(this.playlist[prevIdx]); }

        highlightPlayingCard() {
            document.querySelectorAll('.track-card').forEach(c => c.classList.remove('playing-active'));
            if (this.currentTrack) { const active = document.querySelector(`.track-card[data-id="${this.currentTrack.id}"]`); active?.classList.add('playing-active'); }
        }

        /* --- VISUALIZER SINK SCREEN (Web Audio Canvas or Video element) --- */
        openVisualizer() {
            const modal = document.getElementById('visualizer-modal');
            const dockArea = document.getElementById('vis-dock-area');
            document.getElementById('vis-title').textContent = this.currentTrack?.title || 'MX Studio Sink';
            document.getElementById('vis-artist').textContent = this.currentTrack?.artist || 'Visualizer Active';

            if (this.currentTrack?.isVideo) {
                this.canvas.style.display = 'none';
                this.sink.classList.add('docked-video');
                this.sink.style.display = 'block';
                dockArea.appendChild(this.sink);
            } else {
                this.canvas.style.display = 'block';
                this.initWebAudioVisualizer();
            }
            modal.classList.add('active');
        }

        closeVisualizer() {
            const modal = document.getElementById('visualizer-modal');
            if (this.currentTrack?.isVideo) {
                this.sink.classList.remove('docked-video');
                this.sink.style.display = 'none';
                document.body.appendChild(this.sink);
            }
            modal.classList.remove('active');
        }

        initWebAudioVisualizer() {
            if (!this.audioCtx) {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.analyser = this.audioCtx.createAnalyser();
                this.analyser.fftSize = 256;
                const source = this.audioCtx.createMediaElementAudioSource(this.sink);
                source.connect(this.analyser);
                source.connect(this.audioCtx.destination);
            }
            if (this.audioCtx.state === 'suspended') this.audioCtx.resume();

            if (this.animId) cancelAnimationFrame(this.animId);
            const bufferLength = this.analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            const draw = () => {
                this.animId = requestAnimationFrame(draw);
                if (this.canvas.width !== this.canvas.offsetWidth) this.canvas.width = this.canvas.offsetWidth;
                if (this.canvas.height !== this.canvas.offsetHeight) this.canvas.height = this.canvas.offsetHeight;
                
                try { this.analyser.getByteFrequencyData(dataArray); } catch(e) { return; }
                this.canvasCtx.fillStyle = 'rgba(7, 9, 25, 0.3)';
                this.canvasCtx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                const barWidth = (this.canvas.width / bufferLength) * 2.5; let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * this.canvas.height * 0.85;
                    this.canvasCtx.fillStyle = `hsl(${(i / bufferLength) * 360}, 100%, 50%)`;
                    this.canvasCtx.fillRect(x, this.canvas.height - barHeight, barWidth - 1, barHeight);
                    x += barWidth;
                }
            };
            draw();
        }

        fmt(s) { if (!isFinite(s)) return '0:00'; return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`; }
    }

    window.addEventListener('DOMContentLoaded', () => { window.MXApp = new HTAlbumManager(); window.MXApp.boot(); });
</script>
